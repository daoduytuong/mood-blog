name: keepalive

# Tuyến 2 chống Supabase Free ngủ (song song Vercel Cron trong vercel.json).
# Mỗi 3 ngày (< 7 ngày pause). curl -f: lỗi -> job fail -> GitHub email chủ repo (cảnh báo AC2).
on:
  schedule:
    - cron: "0 7 */3 * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keepalive endpoint (query thật tới Supabase)
        env:
          # TODO(account): đặt repo secret KEEPALIVE_URL (mặc định dưới) + CRON_SECRET (nếu bật bảo vệ).
          KEEPALIVE_URL: ${{ secrets.KEEPALIVE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          URL="${KEEPALIVE_URL:-https://mood-blog-phi.vercel.app/api/keepalive}"
          if [ -n "$CRON_SECRET" ]; then
            curl -fsS -H "Authorization: Bearer ${CRON_SECRET}" "$URL"
          else
            curl -fsS "$URL"
          fi
